android {
    namespace 'moe.shizuku.manager'
    defaultConfig {
        applicationId "com.hamondev.shevery"
        versionCode rootProject.ext.versionCode
        versionName rootProject.ext.versionName
        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=none'
            }
        }
    }
    buildFeatures {
        buildConfig true
        compose true
        prefab true
        aidl true
    }
    sourceSets {
        debug.assets.srcDir(file("$buildDir/generated/rish/debug/assets"))
        release.assets.srcDir(file("$buildDir/generated/rish/release/assets"))
    }
    signingConfigs {
        sign
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.sign
        }
        release {
            signingConfig signingConfigs.sign
            minifyEnabled true
            shrinkResources true
            vcsInfo.include false
            proguardFiles 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        cmake {
            path 'src/main/jni/CMakeLists.txt'
            version = "3.22.1"
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
        resources {
            excludes += ['**']
        }
    }
    dependenciesInfo {
        includeInApk false
    }
    lint {
        checkReleaseBuilds false
    }
}

def androidSdkDirectory = {
    def sdkPath = System.getenv('ANDROID_HOME') ?: System.getenv('ANDROID_SDK_ROOT')
    if (sdkPath != null && !sdkPath.isBlank()) {
        return file(sdkPath)
    }

    def localProperties = rootProject.file('local.properties')
    if (localProperties.canRead()) {
        def props = new Properties()
        props.load(new InputStreamReader(new FileInputStream(localProperties), "UTF-8"))
        sdkPath = props['sdk.dir']
        if (sdkPath != null && !sdkPath.isBlank()) {
            return file(sdkPath)
        }
    }

    throw new GradleException('Android SDK directory was not found')
}

def collapseReleaseResourceNames = task('collapseReleaseResourceNames').doLast {
    def aapt2 = Paths.get(androidSdkDirectory().path, 'build-tools', project.android.buildToolsVersion, 'aapt2')
    def zip = Paths.get(project.buildDir.path, 'intermediates',
            'optimized_processed_res', 'release', 'optimizeReleaseResources', 'resources-release-optimize.ap_')
    def optimized = new File("${zip}.opt")
    def cmd = [
            aapt2.toString(),
            'optimize',
            '--collapse-resource-names',
            '--resources-config-path',
            'aapt2-resources.cfg',
            '-o',
            optimized.toString(),
            zip.toString()
    ]
    def process = new ProcessBuilder(cmd)
            .directory(projectDir)
            .redirectErrorStream(true)
            .start()
    def output = process.inputStream.text
    def exitValue = process.waitFor()
    if (exitValue != 0) {
        throw new GradleException("aapt2 optimize failed (${exitValue}):\n${output}")
    }
    if (exitValue == 0) {
        project.delete(zip)
        optimized.renameTo("$zip")
    }
}

afterEvaluate {
    if (tasks.findByName('optimizeReleaseResources') != null) {
        tasks.getByName('optimizeReleaseResources').finalizedBy(collapseReleaseResourceNames)
    }
    tasks.getByName('preReleaseBuild').dependsOn(':shell:copyReleaseShellDex')
    tasks.getByName('preDebugBuild').dependsOn(':shell:copyDebugShellDex')
    tasks.getByName('mergeReleaseAssets').dependsOn(':shell:copyReleaseShellDex')
    tasks.getByName('mergeDebugAssets').dependsOn(':shell:copyDebugShellDex')

    ['debug', 'release'].each { variantName ->
        def capitalized = variantName.capitalize()
        def copyApk = tasks.register("copy${capitalized}ManagerApk") {
            mustRunAfter("assemble${capitalized}")
            doLast {
                def versionName = rootProject.ext.versionName
                def apkDir = layout.buildDirectory.dir("outputs/apk/${variantName}").get().asFile
                def apk = fileTree(apkDir) { include '*.apk' }.files.find { it.name.endsWith('.apk') }
                if (apk == null) {
                    throw new GradleException("Manager ${variantName} APK was not found")
                }
                copy {
                    from apk
                    into rootProject.layout.projectDirectory.dir('out/apk')
                    rename { "shizuku-v${versionName}-${variantName}.apk" }
                }
                if (variantName == 'release') {
                    def mapping = layout.buildDirectory.file('outputs/mapping/release/mapping.txt').get().asFile
                    if (mapping.exists()) {
                        copy {
                            from mapping
                            into rootProject.layout.projectDirectory.dir('out/mapping')
                            rename { "mapping-${versionName}.txt" }
                        }
                    }
                }
            }
        }
        tasks.getByName("assemble${capitalized}").finalizedBy(copyApk)
    }
}

